name: Docs

# Builds the mkdocs-material site on every push to master and on tag pushes,
# then deploys to GitHub Pages. Configure the docs.neviri.com/cli CNAME to
# point at the gh-pages branch's served URL.
#
# To wire up the CNAME, create `docs/CNAME` containing `docs.neviri.com` (or
# whatever domain you serve from) BEFORE merging this workflow. GitHub Pages
# will pick it up automatically when gh-pages is published.

on:
  push:
    branches: [master, main]
    tags: ["v*"]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - "CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # mkdocs uses git history for last-updated timestamps

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build site
        run: mkdocs build --strict --site-dir site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
