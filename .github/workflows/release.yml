name: Release

# On a `v*` tag push:
#   1. build wheel + sdist
#   2. build standalone PyInstaller binaries on linux/macos-x64/macos-arm64/windows
#   3. smoke-test each binary (--version + --help)
#   4. attach everything to the GitHub Release
#   5. publish wheel + sdist to PyPI (configure path A or B below)
#
# Binary distribution: ~20MB on Windows; ~40-60MB on Linux/macOS depending on
# Python/library size. Documented in CHANGELOG release notes per version.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch to build from"
        required: true
        default: "master"

permissions:
  contents: write
  id-token: write

jobs:
  build-dists:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG does not match pyproject.toml version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Inspect distributions
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  build-binaries:
    name: Build binary (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  label: linux-x86_64,    artifact: neviri-linux-x86_64,   ext: ""    }
          - { os: macos-13,       label: macos-x86_64,    artifact: neviri-macos-x86_64,   ext: ""    }
          - { os: macos-14,       label: macos-arm64,     artifact: neviri-macos-arm64,    ext: ""    }
          - { os: windows-latest, label: windows-x86_64,  artifact: neviri-windows-x86_64, ext: ".exe" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[binary]"

      - name: Build with PyInstaller
        run: pyinstaller pyinstaller.spec --clean --noconfirm

      - name: Smoke test (binary runs)
        shell: bash
        run: |
          BIN="./dist/neviri${{ matrix.ext }}"
          chmod +x "$BIN" || true
          "$BIN" --version
          "$BIN" --help > /dev/null
          # Confirm Python is NOT being resolved from PATH - the binary
          # is self-contained.
          "$BIN" completion bash > /dev/null

      - name: Rename for release
        shell: bash
        run: |
          mv "./dist/neviri${{ matrix.ext }}" "./dist/${{ matrix.artifact }}${{ matrix.ext }}"
          ls -lh "./dist/${{ matrix.artifact }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.ext }}
          retention-days: 7

  sbom:
    name: Generate CycloneDX SBOM
    needs: [build-dists]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + SBOM tool
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[security]"

      - name: Generate SBOM (CycloneDX JSON)
        # cyclonedx-py reads the active venv to enumerate dependencies. Output
        # is a portable CycloneDX 1.5 SBOM that auditors and SCA tools accept.
        run: |
          cyclonedx-py environment --output-format json --output-file neviri-cli-sbom.json
          ls -lh neviri-cli-sbom.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: neviri-cli-sbom.json
          retention-days: 90

  sign-artifacts:
    name: Sign artifacts (Sigstore keyless)
    needs: [build-dists, build-binaries, sbom]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write  # required for Sigstore OIDC keyless signing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.0"

      - name: Sign every release artifact
        # Keyless signing uses the GitHub Actions OIDC token to identify the
        # signer. No long-lived keys live in the repo. Produces *.sig and *.crt
        # files alongside each artifact.
        run: |
          set -e
          for f in artifacts/*; do
            if [ -f "$f" ]; then
              echo "Signing $f"
              cosign sign-blob --yes \
                --output-signature "${f}.sig" \
                --output-certificate "${f}.crt" \
                "$f"
            fi
          done
          ls -lh artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: signatures
          path: |
            artifacts/*.sig
            artifacts/*.crt
          retention-days: 90

  github-release:
    name: Attach to GitHub Release
    needs: [build-dists, build-binaries, sbom, sign-artifacts]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Determine pre-release status
        id: prerelease
        run: |
          if echo "${GITHUB_REF#refs/tags/}" | grep -qE '(a|b|rc)[0-9]+$'; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value }}

  bump-homebrew-tap:
    name: Bump Homebrew formula in ArcLogiQ/homebrew-tap
    needs: [github-release]
    runs-on: ubuntu-latest
    # Only stable releases bump Homebrew — pre-releases (alpha/beta/rc) keep
    # the tap on the last stable so `brew install neviri` doesn't grab a
    # beta by surprise.
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      !contains(github.ref, 'a') && !contains(github.ref, 'b') && !contains(github.ref, 'rc')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Compute SHA256 for each binary
        id: shas
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          ARM_MAC=$(sha256sum artifacts/neviri-macos-arm64 | awk '{print $1}')
          X64_MAC=$(sha256sum artifacts/neviri-macos-x86_64 | awk '{print $1}')
          LIN=$(sha256sum artifacts/neviri-linux-x86_64 | awk '{print $1}')
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "sha_macos_arm64=$ARM_MAC" >> "$GITHUB_OUTPUT"
          echo "sha_macos_x86_64=$X64_MAC" >> "$GITHUB_OUTPUT"
          echo "sha_linux_x86_64=$LIN"     >> "$GITHUB_OUTPUT"

      - name: Render formula
        run: |
          TAG="${{ steps.shas.outputs.tag }}"
          VERSION="${{ steps.shas.outputs.version }}"
          BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"
          cat > rendered-neviri.rb <<EOF
          class Neviri < Formula
            desc "Official command-line interface for the Neviri Cloud Platform"
            homepage "https://github.com/${{ github.repository }}"
            version "$VERSION"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "$BASE/neviri-macos-arm64"
                sha256 "${{ steps.shas.outputs.sha_macos_arm64 }}"
              end
              on_intel do
                url "$BASE/neviri-macos-x86_64"
                sha256 "${{ steps.shas.outputs.sha_macos_x86_64 }}"
              end
            end

            on_linux do
              url "$BASE/neviri-linux-x86_64"
              sha256 "${{ steps.shas.outputs.sha_linux_x86_64 }}"
            end

            def install
              if OS.mac? && Hardware::CPU.arm?
                bin.install "neviri-macos-arm64" => "neviri"
              elsif OS.mac?
                bin.install "neviri-macos-x86_64" => "neviri"
              else
                bin.install "neviri-linux-x86_64" => "neviri"
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/neviri --version")
            end
          end
          EOF
          cat rendered-neviri.rb

      - name: Open PR on Homebrew tap
        # Push the new formula to ArcLogiQ/homebrew-tap on a branch named for
        # the tag and open a PR. Maintainer merges manually. (Direct commits
        # to master would also work; PR keeps a human in the loop.)
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -e
          TAG="${{ steps.shas.outputs.tag }}"
          BRANCH="bump-neviri-$TAG"
          git config --global user.name "neviri-cli release bot"
          git config --global user.email "bot@neviri.example"
          git clone "https://x-access-token:$TAP_TOKEN@github.com/ArcLogiQ/homebrew-tap.git" tap
          cd tap
          mkdir -p Formula
          cp ../rendered-neviri.rb Formula/neviri.rb
          git checkout -B "$BRANCH"
          git add Formula/neviri.rb
          git commit -m "neviri $TAG"
          git push --force origin "$BRANCH"
          # Use the GitHub CLI to open the PR if not already open.
          GH_TOKEN="$TAP_TOKEN" gh pr create \
            --repo ArcLogiQ/homebrew-tap \
            --title "neviri $TAG" \
            --body "Bumps neviri to $TAG. Artefacts attached to https://github.com/${{ github.repository }}/releases/tag/$TAG" \
            --head "$BRANCH" \
            --base master \
            || echo "PR may already exist for $BRANCH; skipping."

  publish-pypi:
    name: Publish wheel + sdist to PyPI
    needs: build-dists
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      # Set to your private/internal index URL when alpha-publishing;
      # public PyPI is the GA target.
      url: ${{ vars.PYPI_PROJECT_URL || 'https://pypi.org/p/neviri-cli' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Pick ONE of the two publish paths:
          #
          # (a) Token-based (private/internal index OR test.pypi.org):
          # password: ${{ secrets.PYPI_API_TOKEN }}
          # repository-url: ${{ vars.PYPI_REPOSITORY_URL }}
          #
          # (b) Trusted publishing (public PyPI / OIDC, no secret needed):
          #     Leave both `password` and `repository-url` unset.
          skip-existing: true
