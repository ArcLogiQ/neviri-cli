name: Release

# Phase 1: cuts an alpha by tagging `vX.Y.Z(aN|bN|rcN)?` on master and:
#   1. builds a wheel + sdist
#   2. uploads them as a GitHub Release artefact
#   3. publishes to a PyPI index
#
# IMPORTANT — before flipping this on you must do ONE of:
#   (a) Internal/private index (default for Phase 1 alpha):
#       Set the `repository-url` step input below to the index URL, and
#       define `PYPI_API_TOKEN` as a repository secret pointing at that index.
#   (b) Public PyPI (Phase 3 / GA):
#       Configure trusted publishing on https://pypi.org/manage/account/publishing/
#       for project `neviri-cli`, environment `pypi`, and remove the
#       password input below (OIDC will take over via id-token).
#
# The job will refuse to publish until ONE of the two paths is configured.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch to build from"
        required: true
        default: "master"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG does not match pyproject.toml version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Inspect distributions
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  github-release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Determine pre-release status
        id: prerelease
        run: |
          if echo "${GITHUB_REF#refs/tags/}" | grep -qE '(a|b|rc)[0-9]+$'; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value }}

  publish-pypi:
    name: Publish to PyPI index
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      # Set this to your private index URL when alpha-publishing internally;
      # public PyPI is the eventual GA target.
      url: ${{ vars.PYPI_PROJECT_URL || 'https://pypi.org/p/neviri-cli' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Pick ONE of the two publish paths (see header comment).
          #
          # (a) Token-based (private/internal index):
          # password: ${{ secrets.PYPI_API_TOKEN }}
          # repository-url: ${{ vars.PYPI_REPOSITORY_URL }}
          #
          # (b) Trusted publishing (public PyPI / OIDC, no secret needed):
          #     Leave both `password` and `repository-url` unset.
          skip-existing: true
