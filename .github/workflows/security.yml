name: Security

# Phase 3 / Story 19 — security hardening pipeline.
#
# Runs three independent scanners:
#   1. bandit       — Python static analysis on src/
#   2. pip-audit    — dependency vulnerabilities (PyPI advisories)
#   3. trivy        — filesystem scan covering the lockfile + project tree
#
# All scanners run on every push to master AND on a weekly schedule so we
# pick up newly-published advisories without code churn.
#
# Each job uploads its SARIF/JSON report as a workflow artifact for review.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Required for SARIF uploads via github/codeql-action/upload-sarif.
  security-events: write

jobs:
  bandit:
    name: Bandit (static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[security]"

      - name: Run bandit
        # Config lives in [tool.bandit] in pyproject.toml.
        run: |
          bandit -r src/ -c pyproject.toml -f json -o bandit-report.json
          bandit -r src/ -c pyproject.toml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  pip-audit:
    name: pip-audit (dependency vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install pip-audit only
        # Don't install neviri-cli itself — we audit the DECLARED runtime deps
        # via a generated requirements file. This avoids the editable / not-yet-
        # on-PyPI conflict with `pip-audit --strict`.
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Extract runtime deps from pyproject.toml
        run: |
          python <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              deps = tomllib.load(f)["project"]["dependencies"]
          with open("audit-requirements.txt", "w") as f:
              f.write("\n".join(deps) + "\n")
          PY
          cat audit-requirements.txt

      - name: Run pip-audit
        # --strict: exit nonzero on any unaudited dep too (defense in depth)
        run: pip-audit --format columns --strict --requirement audit-requirements.txt

      - name: Run pip-audit (JSON report)
        if: always()
        run: |
          pip-audit --format json --output pip-audit-report.json \
            --requirement audit-requirements.txt || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

  trivy:
    name: Trivy (filesystem scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        # Install the binary directly rather than using aquasecurity/trivy-action,
        # whose tagging is inconsistent (different trivy-action versions pin
        # setup-trivy refs that don't always exist as tags). Pinning the trivy
        # version here keeps the scan reproducible.
        #
        # NOTE: `curl -f` makes a 404 fail loudly instead of silently
        # downloading a GitHub HTML 404 page; before that flag was added we
        # spent a CI cycle chasing why `trivy fs` produced no output.
        env:
          TRIVY_VERSION: "0.70.0"
        run: |
          set -euo pipefail
          curl -fsSL -o trivy.tar.gz \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf trivy.tar.gz trivy
          sudo mv trivy /usr/local/bin/trivy
          trivy --version

      - name: Run Trivy filesystem scan
        # Don't fail the build on findings — they appear in the Security tab
        # via SARIF upload. Trivy on application source produces a lot of
        # noise; we want signal in the dashboard, not red builds.
        run: |
          set -euo pipefail
          trivy fs \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 0 \
            .
          ls -lh trivy-results.sarif

      - name: Upload Trivy SARIF to Security tab
        # codeql-action v3 deprecates in Dec 2026; v4 is the current line.
        # `hashFiles(...) != ''` guards against uploading when the scan step
        # failed before writing the SARIF.
        uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
