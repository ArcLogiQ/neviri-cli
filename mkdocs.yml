site_name: neviri-cli
site_description: Command-line interface for the Neviri Cloud Platform
site_url: https://docs.neviri.com/cli/
repo_url: https://github.com/ArcLogiQ/neviri-cli
repo_name: ArcLogiQ/neviri-cli
edit_uri: edit/master/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Privacy: privacy.md
  - Decisions:
      - "ADR 0001: VM surface": decisions/0001-vm-surface.md
      - "ADR 0002: Phase 1 alpha cut": decisions/0002-phase-1-alpha-cut.md
      - "ADR 0003: Phase 2 exit": decisions/0003-phase-2-exit.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
      title: On this page

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ArcLogiQ/neviri-cli
